properties:
  configuration:
    ingress:
      external: true
      targetPort: 8080
    secrets:
      - name: redis-url
        value: "<set-in-azure>"
  template:
    containers:
      - name: policyclaim-api
        image: policyclaimregistry.azurecr.io/policyclaim-api:latest
        env:
          - name: AI_SERVICE_BASE_URL
            value: "http://policyclaim-ai-service"
          - name: REDIS_URL
            secretRef: redis-url
        resources:
          cpu: 0.5
          memory: 1Gi
